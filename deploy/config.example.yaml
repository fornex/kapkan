# Kapkan production configuration example.
# Copy to /etc/kapkan/config.yaml and adjust for your network.
#
# SAFETY: dry_run defaults to true. Leave it true until you have verified, via
# the logs and /api/v1/attacks, that detection fires on the right prefixes and
# that the would-be blackhole routes look correct. Only then set dry_run: false.

dry_run: true

listen:
  sflow: ":6343"
  netflow: ":2055" # NetFlow v5/v9 + IPFIX share this socket

sampling:
  default_rate: 1000 # used only when an exporter does not report its own rate

networks: # detection applies ONLY to destinations inside these prefixes
  - "203.0.113.0/24"
  - "2001:db8::/32"

protected_whitelist: # these addresses are never banned, regardless of traffic
  - "203.0.113.1" # gateway / router
  - "203.0.113.2" # authoritative nameserver

thresholds: # per destination host, after sampling correction
  pps: 80000 # packets/sec
  mbps: 1000 # megabits/sec
  flows_per_sec: 35000 # flows/sec
  # Optional per-protocol limits, 0/absent = disabled. Any crossed limit
  # triggers (OR). tcp_syn counts pure SYNs; frag counts non-first fragments.
  # tcp_pps: 0
  # udp_pps: 40000
  # icmp_pps: 5000
  # tcp_syn_pps: 5000
  # frag_pps: 3000

# Optional: watch traffic LEAVING protected hosts (compromised machines).
# Same keys as `thresholds`; at least one required. Absent = outgoing
# traffic is not counted at all.
#
# thresholds_outgoing:
#   pps: 50000
#   udp_pps: 20000

# Continuous learned thresholds: detection tightens to each host's normal
# level × factor, bounded by `floor` below and the static thresholds above.
# Attack traffic never trains the baseline; learning input is clamped so a
# slow attacker ramp cannot quickly inflate it.
#
# baseline:
#   factor: 3
#   half_life_seconds: 3600
#   warmup_seconds: 600
#   floor:
#     pps: 5000
#     mbps: 50
#     flows_per_sec: 2000

# Attack samples: recent flows are buffered continuously so detections carry
# their dominant sources/ports/protocols instantly. ~120 bytes per buffered
# flow; sizing changes require a restart.
#
# samples:
#   enabled: true
#   buffer_flows: 65536    # total ring capacity across the engine
#   flows_per_attack: 20   # raw flow records attached to one attack

# Optional: group prefixes under their own thresholds and mitigation policy.
# Hosts not matched by any group use the global thresholds above. The most
# specific (longest) prefix wins. Group prefixes must lie inside `networks`.
#
# hostgroups:
#   - name: web # per-host detection with tighter limits
#     networks:
#       - "203.0.113.0/26"
#     thresholds: # omit to inherit the global thresholds
#       pps: 20000
#       mbps: 500
#       flows_per_sec: 10000
#   - name: customers-no-rtbh # detect and notify, but never auto-blackhole
#     networks:
#       - "203.0.113.64/26"
#     ban: false
#   - name: dns-pool # alert on the pool's TOTAL traffic; never auto-bans
#     networks:
#       - "203.0.113.128/26"
#     calculation: total
#     thresholds:
#       pps: 300000
#       mbps: 4000
#       flows_per_sec: 150000

# Mitigation method (default: blackhole = RTBH /32 or /128). FlowSpec drops
# only the attack vector and spares the victim's other traffic (RFC 8955/8956,
# IPv4 and IPv6). Hostgroups can override `mitigation`. Always dry-run-first:
# generated rules show in the API/notifications before you set dry_run: false.
#
# mitigation: flowspec
# flowspec:
#   action: discard      # or rate_limit
#   rate_mbps: 100       # required for rate_limit
#
# Or an escalation ladder (supersedes `mitigation`): step the response up the
# longer an attack lasts. Each rung fires after the given seconds IF the
# attack is still active. First rung must be at 0; per-hostgroup overridable.
# Actions may only strengthen: none < flowspec < divert < blackhole.
#
# escalation:
#   - {after_seconds: 0,   action: none}        # alert only
#   - {after_seconds: 30,  action: flowspec}    # then surgical drop
#   - {after_seconds: 90,  action: divert}      # then divert to a scrubber
#   - {after_seconds: 300, action: blackhole}   # then blackhole if it persists

# Traffic diversion (scrubbing): the `divert` action announces the victim host
# route toward a scrubbing center instead of dropping it. Required to use the
# divert action / method. Per-hostgroup overridable via a group `scrubbing:`
# block (same shape as the per-group `bgp:` block).
#
# scrubbing:
#   next_hop: "192.0.2.100"   # scrubbing center next-hop (v4)
#   next_hop6: "100::100"     # required when IPv6 space is protected
#   community: "65000:200"    # optional divert community
#   local_pref: 200           # often raised so the divert route wins selection

ban:
  ttl_seconds: 600 # every ban auto-withdraws after this (no permanent bans)
  unban_hysteresis_seconds: 120 # traffic must stay below threshold this long to unban
  max_active_bans: 50 # refuse new bans past this cap (never blackhole half the net)

bgp:
  local_asn: 65001
  router_id: "10.0.0.1" # must be an IPv4 dotted-quad
  next_hop: "192.0.2.1" # IPv4 blackhole (discard) next-hop
  next_hop6: "100::1" # IPv6 blackhole next-hop (RFC 6666 discard prefix)
  community: "65000:666" # RTBH community your upstream honors
  # communities: ["65000:666", "65000:777"] # full set (overrides `community`)
  # local_pref: 100      # optional LOCAL_PREF on blackholes (iBGP peers); 0 = omit
  neighbors:
    - address: "10.0.0.254"
      remote_asn: 65000

# Hostgroups can override the blackhole BGP attributes so different customers
# signal their own upstreams. Each unset field inherits the global bgp block;
# the resolved attributes are frozen per ban (a reload only affects new bans).
#
# hostgroups:
#   - name: customer-a
#     networks: ["203.0.113.64/26"]
#     bgp:
#       communities: ["65000:100", "65001:200"]
#       next_hop: "192.0.2.50"
#       local_pref: 250

notify:
  telegram:
    token_env: "KAPKAN_TG_TOKEN" # token is read from this env var, never the file
    chat_id: "-1001234567890"
  webhook:
    url: "" # optional: generic JSON POST on every attack start/end
    # payload schema: docs/callback-schema.json (check schema_version)
  slack:
    webhook_url: "" # optional: Slack incoming webhook
  email: # optional: SMTP; credentials from env vars
    smtp_host: "" # "mail.example.com:587"; empty disables
    from: ""
    to: [] # ["ops@example.com"]
    username_env: "KAPKAN_SMTP_USER"
    password_env: "KAPKAN_SMTP_PASS"
    require_tls: false # STARTTLS is auto-required when credentials are set
  exec: # optional: hook run on every attack event (no shell)
    # Absolute path to an existing executable. Runs with a minimal environment
    # (no daemon secrets); the whole process group is killed on timeout.
    command: ""
    timeout_seconds: 10
    # format: kapkan (default) passes the event name as $1 and the JSON payload
    # on stdin. format: fastnetmon mimics FastNetMon's notify_script — argv is
    # "<ip> <direction> <pps> <action>" (action: ban|unban|attack_details) with
    # a text summary on stdin — so existing FastNetMon scripts run unchanged.
    # In dry-run kapkan only ever emits attack_details (never ban/unban), so a
    # FastNetMon ban script cannot block a host you are only validating.
    # format: fastnetmon

# Optional ClickHouse history (forensics + dashboard graphs). kapkan uses
# the HTTP interface — no driver dependency. Absent = live data only.
# Persistence is best-effort: a slow/down ClickHouse drops rows, never
# blocks detection.
#
# storage:
#   clickhouse:
#     url: "http://127.0.0.1:8123"
#     database: "kapkan"
#     username_env: "KAPKAN_CH_USER"
#     password_env: "KAPKAN_CH_PASS"
#     ttl_days: 7
#     flush_interval_seconds: 5
#     batch_size: 1000
#     queue_size: 100000
#     traffic_interval_seconds: 10

api:
  listen: "127.0.0.1:8080" # default localhost bind needs no auth
  dashboard: true # embedded web UI at / on this listener; false = JSON API only
  # AUTH — REQUIRED before exposing beyond localhost. Secrets come from env
  # vars, never the file. Use ONE of:
  #
  # token_env: "KAPKAN_API_TOKEN" # a single operator token (read + mutate)
  #
  # tokens: # or role-based: viewer = read-only, operator = read + ban/reload
  #   - {name: dashboard,  token_env: "KAPKAN_API_RO", role: viewer}
  #   - {name: automation, token_env: "KAPKAN_API_RW", role: operator}
