name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build & test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: make test

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # The golangci-lint action manages its own module cache.
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          # Tracks the latest v2.x (matches .golangci.yml version "2").
          # Pin to a specific tag for fully reproducible runs.
          version: latest

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck (gate on reachable, non-accepted advisories)
        # Enforced gate: fails on any *reachable* (symbol-level "called") advisory
        # that is NOT in the accepted allowlist. Non-reachable findings (a vuln is
        # imported/required but never called) are printed but do not fail the job.
        #
        # Accepted advisories — must have no upstream fix; revisit each release:
        #   GO-2026-4736  gobgp DoS via a crafted NEXT_HOP path attribute. Only
        #                 reachable from a *configured* BGP peer (the operator's
        #                 own router), which is trusted in kapkan's threat model.
        #                 No fixed gobgp release exists. Drop from ACCEPTED once
        #                 a patched gobgp ships and is adopted.
        env:
          ACCEPTED: "GO-2026-4736"
        run: |
          set -euo pipefail
          # Human-readable report in the logs (don't fail the step on findings).
          go run golang.org/x/vuln/cmd/govulncheck@latest ./... || true
          # Machine-readable pass drives the actual gate (-format json exits 0).
          go run golang.org/x/vuln/cmd/govulncheck@latest -format json ./... > govuln.json
          reachable="$(jq -rs '[.[]|select(.finding.trace[0].function!=null)|.finding.osv]|unique[]' govuln.json)"
          echo "Reachable advisories: ${reachable:-none}"
          fail=0
          for id in $reachable; do
            case " $ACCEPTED " in
              *" $id "*) echo "::warning::Reachable advisory accepted (no upstream fix): $id" ;;
              *) echo "::error::Reachable vulnerability not in accepted allowlist: $id"; fail=1 ;;
            esac
          done
          exit $fail
