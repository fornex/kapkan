name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build & test (race)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache: true
          cache-dependency-path: engine/go.sum
      # `make build`/`make test` first copy console/ into internal/api/static
      # (the go:embed target) so the single binary embeds the operator console.
      - name: Build (single binary, console embedded)
        run: make build
      - name: Test (race)
        run: make test

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          # The golangci-lint action manages its own module cache.
          cache: false
      # The api package go:embeds static/; populate it before the linter
      # type-checks, or the package won't compile.
      - name: Sync console assets (go:embed target)
        run: make console-sync
        working-directory: engine
      - uses: golangci/golangci-lint-action@v7
        with:
          # Tracks the latest v2.x (matches engine/.golangci.yml version "2").
          version: latest
          working-directory: engine

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache: true
          cache-dependency-path: engine/go.sum
      - name: Sync console assets (go:embed target)
        run: make console-sync
      - name: Run govulncheck (gate on reachable, non-accepted advisories)
        # Enforced gate: fails on any *reachable* (symbol-level "called") advisory
        # that is NOT in the accepted allowlist. Non-reachable findings (a vuln is
        # imported/required but never called) are printed but do not fail the job.
        #
        # Accepted advisories — must have no upstream fix; revisit each release:
        #   GO-2026-4736  gobgp DoS via a crafted NEXT_HOP path attribute. Only
        #                 reachable from a *configured* BGP peer (the operator's
        #                 own router), which is trusted in kapkan's threat model.
        #                 No fixed gobgp release exists. Drop from ACCEPTED once
        #                 a patched gobgp ships and is adopted.
        env:
          ACCEPTED: "GO-2026-4736"
        run: |
          set -euo pipefail
          # Human-readable report in the logs (don't fail the step on findings).
          go run golang.org/x/vuln/cmd/govulncheck@latest ./... || true
          # Machine-readable pass drives the actual gate (-format json exits 0).
          go run golang.org/x/vuln/cmd/govulncheck@latest -format json ./... > govuln.json
          reachable="$(jq -rs '[.[]|select(.finding.trace[0].function!=null)|.finding.osv]|unique[]' govuln.json)"
          echo "Reachable advisories: ${reachable:-none}"
          fail=0
          for id in $reachable; do
            case " $ACCEPTED " in
              *" $id "*) echo "::warning::Reachable advisory accepted (no upstream fix): $id" ;;
              *) echo "::error::Reachable vulnerability not in accepted allowlist: $id"; fail=1 ;;
            esac
          done
          exit $fail

  site:
    name: site build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/frontend/package-lock.json
      # `prebuild` also compiles the engine config validator to wasm
      # (scripts/build-wasm.mjs) so the config builder ships engine-exact
      # in-browser validation. The step is tolerant of a missing toolchain, but
      # CI provides Go so the built site matches production.
      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache: true
          cache-dependency-path: engine/go.sum
      - name: Install
        run: npm ci
      # `prebuild` copies the top-level docs/ into content/docs and builds the
      # wasm validator before next build.
      - name: Build static export
        run: npm run build
